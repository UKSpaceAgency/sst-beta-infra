name: Deploy to AWS
on:
  workflow_dispatch:
    inputs:
      invoker:
        description: 'Invoker'
        required: true
        default: ''
      env:
        description: 'Environment'
        required: false
        default: 'dev'
      image-tag:
        description: 'image ecr sha tag'
        required: true
        default: 'latest'

jobs:
  called_with_by:
    name: Objective
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "AWS Deploy ${{ github.event.inputs.invoker }} on ${{ github.event.inputs.env }}"

      - name: Send start message to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          # For posting a rich message using Block Kit
          payload: |
            {
              "text": "*[${{ github.event.inputs.env }}] AWS Release Train* ${{ github.run_id }}: Leaving the station to execute *${{ github.event.inputs.invoker }}*"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK


  deploy:
    needs: called_with_by
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.env }}
    concurrency: ${{ github.event.inputs.env }}-aws

    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read  # This is required for actions/checkout
      checks: write
      pull-requests: write

    steps:
      - uses: hashicorp/setup-terraform@v3

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: Moulick/configure-multiple-aws-roles@v4
        with:
          role-to-assume: ${{ vars.ecs_rollout_role }}
          profile: uksa-mys-dev-env
          aws-region: eu-west-2

      - name: Terraform Back-End (or Data Cache) init and apply
        if: ${{ github.event.inputs.invoker == 'backend' || github.event.inputs.invoker == 'data-cache'  }}
        run: |
          cd aws/envs/${{ github.event.inputs.env }}/${{ github.event.inputs.invoker }}
          terraform init
          echo "image_tag = \"${{ github.event.inputs.image-tag }}\"" >> terraform.tfvars
          echo "env_name = \"${{ github.event.inputs.env }}\"" >> terraform.tfvars
          cat terraform.tfvars
          terraform apply -auto-approve

      - name: Terraform Front-End init and apply
        if: ${{ github.event.inputs.invoker == 'frontend' || github.event.inputs.invoker == 'frontend2' }}
        run: |
          cd aws/envs/${{ github.event.inputs.env }}/${{ github.event.inputs.invoker }}
          terraform init
          echo "image_tag = \"${{ github.event.inputs.image-tag }}\"" >> terraform.tfvars
          echo "env_name = \"${{ github.event.inputs.env }}\"" >> terraform.tfvars
          cat terraform.tfvars
          terraform apply -auto-approve

      - name: Send build result to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          # For posting a rich message using Block Kit
          payload: |
            {
              "text": "*[${{ github.event.inputs.env }}] AWS Release Train* ${{ github.run_id }}: Pulling into the station - ${{ job.status }}\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}"

            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: History entry to S3
        shell: bash
        env:
          DEPLOYMENT_HISTORY_BUCKET: ${{ vars.deployment_history_bucket }}
          IMAGE_TAG: ${{ github.event.inputs.image-tag }}
          DEPLOY_ENV: ${{ github.event.inputs.env }}
          INVOKER: ${{ github.event.inputs.invoker }}
        run: |
          set -euo pipefail

          YEAR="$(date -u +'%Y')"
          MANIFEST_FILE="manifest-${YEAR}.json"
          LOCAL_D_FILE="$(date -u +'%s').txt"
          DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          DISPLAY_DEPLOYED_AT="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          ENVIRONMENT_NAME="${DEPLOY_ENV}-${INVOKER}"

          printf '%s\n%s\n%s\n' "$DISPLAY_DEPLOYED_AT" "$IMAGE_TAG" "$ENVIRONMENT_NAME" > "$LOCAL_D_FILE"
          cat "$LOCAL_D_FILE"

          aws s3 cp "./$LOCAL_D_FILE" "s3://${DEPLOYMENT_HISTORY_BUCKET}/$LOCAL_D_FILE" --profile uksa-mys-dev-env

          if ! aws s3 cp "s3://${DEPLOYMENT_HISTORY_BUCKET}/${MANIFEST_FILE}" "$MANIFEST_FILE" --profile uksa-mys-dev-env; then
            printf '[]\n' > "$MANIFEST_FILE"
          fi

          jq \
            --arg key "$LOCAL_D_FILE" \
            --arg deployedAt "$DEPLOYED_AT" \
            --arg commitId "$IMAGE_TAG" \
            --arg environmentName "$ENVIRONMENT_NAME" \
            '[{
              key: $key,
              deployedAt: $deployedAt,
              commitId: $commitId,
              environmentName: $environmentName
            }] + . | unique_by(.key) | sort_by(.deployedAt) | reverse' \
            "$MANIFEST_FILE" > manifest.new.json

          aws s3 cp manifest.new.json "s3://${DEPLOYMENT_HISTORY_BUCKET}/${MANIFEST_FILE}" \
            --content-type "application/json" \
            --cache-control "max-age=60, must-revalidate" \
            --profile uksa-mys-dev-env

  execute-e2e:
    needs: deploy
    name: Execute backend E2E tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.env == 'dev' }} #invoke only for dev.
    environment:
      name: ${{ github.event.inputs.env }}
    concurrency: ${{ github.event.inputs.env }}-aws

    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read  # This is required for actions/checkout
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: Moulick/configure-multiple-aws-roles@v4
        with:
          role-to-assume: ${{ vars.ecs_rollout_role }}
          profile: uksa-mys-dev-env
          aws-region: eu-west-2

      - name: Execute Backend E2E API tests
        uses: matt-ball/newman-action@master
        if: ${{ github.event.inputs.invoker == 'backend' }}
        with:
          workingDir: aws/e2e_tests
          collection: aws/e2e_tests/postman_collection.json
          environment: aws/e2e_tests/postman_environment.json
          reporters: '["cli","junit"]'
          envVar: '[{ "key": "clientId", "value": "${{ secrets.e2e_client_id }}" },{ "key": "clientSecret", "value": "${{ secrets.e2e_client_secret }}" },{ "key": "baseUrl", "value": "${{ vars.e2e_base_url }}" },{ "key": "authBaseUrl", "value": "${{ vars.e2e_auth0_base_url }}" },{ "key": "testSatellitePrimaryName", "value": "${{ vars.e2e_satellite_name }}" }, { "key": "authAudience", "value": "${{ secrets.e2e_auth0_audience }}" }]'

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() || failure()
        with:
          files: |
            **/newman-run-*.xml
